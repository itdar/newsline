name: Update Homebrew Tap

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cc-plugin (at the tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version stamp matches tag
        run: |
          V="${{ steps.version.outputs.version }}"
          grep -q "NEWSLINE_VERSION:-$V}" refresh.sh \
            || { echo "::error::refresh.sh NEWSLINE_VERSION != $V — bump it, commit, then re-tag"; exit 1; }

      - name: Calculate SHA256 of the release tarball
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: itdar/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula from template
        run: |
          sed -e "s|TAG_PLACEHOLDER|${{ steps.version.outputs.tag }}|g" \
              -e "s|VERSION_PLACEHOLDER|${{ steps.version.outputs.version }}|g" \
              -e "s|SHA_PLACEHOLDER|${{ steps.sha.outputs.sha256 }}|g" \
              dist/newsline.rb > homebrew-tap/newsline.rb
          echo "--- rendered ---"; cat homebrew-tap/newsline.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsline.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump newsline to ${{ steps.version.outputs.tag }}"
          git push
